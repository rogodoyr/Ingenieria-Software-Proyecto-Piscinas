spring.application.name=dashboard-service
server.port=3338

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5438/dashboard_db}
spring.datasource.username=${DB_USERNAME:dashboard_user}
spring.datasource.password=${DB_PASSWORD:dashboard_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

logging.level.root=DEBUG
logging.level.org.springframework=DEBUG
logging.level.com.veranoperfecto.dashboard=DEBUG

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Other services URLs
apiCliente.url=http://localhost:3334/api
apiMantencion.url=http://localhost:3335/api
apiVenta.url=http://localhost:3336/api
