spring.application.name=cliente-service
server.port=3334

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/cliente_db}
spring.datasource.username=${DB_USERNAME:cliente_user}
spring.datasource.password=${DB_PASSWORD:cliente_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

logging.level.root=DEBUG
logging.level.org.springframework=DEBUG
logging.level.com.veranoperfecto.cliente=DEBUG

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Auth-Service URL for JWT validation
apiAuth.url=http://localhost:3333/api

# Telegram Notificaciones
spring.config.import=optional:file:.env[.properties], optional:file:./.env
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.chatId=${TELEGRAM_CHAT_ID:}
