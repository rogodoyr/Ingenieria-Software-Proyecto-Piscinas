spring.application.name=mantencion-service
server.port=3335

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5435/mantencion_db}
spring.datasource.username=${DB_USERNAME:mantencion_user}
spring.datasource.password=${DB_PASSWORD:mantencion_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

logging.level.root=DEBUG
logging.level.org.springframework=DEBUG
logging.level.com.veranoperfecto.mantencion=DEBUG

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
