services:
  postgresMantencion:
    image: postgres:16-alpine
    container_name: veranoperfecto-mantencion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mantencion_db
      POSTGRES_USER: mantencion_user
      POSTGRES_PASSWORD: mantencion_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres_mantencion_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mantencion_user -d mantencion_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_mantencion_data:
